name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --bundles none

      - name: Package portable zip
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/release"
          $stagingDir = "XivGCDPlanner"
          New-Item -ItemType Directory -Path $stagingDir -Force
          Copy-Item "$releaseDir/XivGCDPlanner.exe" $stagingDir/
          Copy-Item -Recurse "src-tauri/data" "$stagingDir/data"
          Compress-Archive -Path "$stagingDir/*" -DestinationPath "XivGCDPlanner-${{ github.ref_name }}-windows-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "XivGCDPlanner ${{ github.ref_name }}"
          body: |
            ## ダウンロード
            zipを展開して `XivGCDPlanner.exe` を実行してください。
            インストール不要です。
          files: XivGCDPlanner-${{ github.ref_name }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
